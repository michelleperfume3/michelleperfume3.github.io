<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michelle | Մեր մասին</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff; /* Փոխված է սպիտակի */
            color: #b58d1d; /* Ոսկեգույնը մի փոքր մուգ է արված սպիտակ ֆոնի վրա լավ երևալու համար */
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        /* Գլխավոր էջ կոճակի ոճը */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background-color: transparent;
            color: #000000;
            border: 1px solid #000000;
            text-decoration: none;
            font-size: 0.9rem;
            border-radius: 5px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background-color: #000000;
            color: #ffffff; /* Հովերի ժամանակ տեքստը դառնում է սպիտակ */
        }

        .container {
            width: 90%;
            max-width: 600px;
            padding: 20px;
            text-align: center;
        }

        .main-logo { width: 300px; max-width: 100%; height: auto; margin-bottom: 20px; }

        h1 { text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #b58d1d; display: inline-block; padding-bottom: 5px; font-size: 1.5rem; }

        .about-text { color: #444444; line-height: 1.5; margin: 15px 0; } /* Մոխրագույն տեքստ՝ ընթեռնելիության համար */

        .installment-box {
            display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
            gap: 10px; margin: 20px 0; padding: 15px; border: 1px solid #b58d1d; border-radius: 10px;
            color: #444444; /* Մուգ տեքստ տուփի ներսում */
        }

        .mini-logo { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }

        .contact-info { margin-top: 20px; padding-top: 15px; border-top: 1px solid #000000; font-size: 0.9rem; color: #444444; }
        
        a { color: #000000; text-decoration: none; }

        @media (max-width: 480px) {
            .back-btn { left: 10px; padding: 8px 15px; font-size: 0.8rem; }
            .installment-box { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Գլխավոր</a>

    <div class="container">
        <img src="logo2.jpg" alt="Michelle" class="main-logo">
        
        <h1>Մեր մասին</h1>
        
        <p class="about-text">
            Մենք ստեղծում ենք բացառիկ բույրեր, որոնք ընդգծում են ձեր յուրահատկությունն ու ոճը։ Յուրաքանչյուր կաթիլ պատմում է իր պատմությունը։
        </p>

        <div class="installment-box">
            <img src="8834.jpg" alt="Cash me" class="mini-logo">
            <div class="installment-text">Մեզ մոտ գործում է ՄԱՍ-ՄԱՍ վճարման համակարգ՝ ՀԵՇՏ ՈՒ ԱՐԱԳ։</div>
        </div>

        <div class="contact-info">
            <div class="contact-item">📍 ք. Երևան, Կենտրոն, Տերյան 12</div>
            <div class="contact-item">✉️ <a href="mailto:info@michelle.am">info@michelle.am</a></div>
            <div class="contact-item">📞 <a href="tel:+37499000000">+374 99 00 00 00</a></div>
        </div>
    </div>

</body>
</html>
